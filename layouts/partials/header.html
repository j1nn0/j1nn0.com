<header class="site-header">
  <nav class="site-nav" aria-label="メインナビゲーション">
    <a class="site-nav__brand" href="{{ "" | absLangURL }}" accesskey="h" title="{{ site.Title }} (Alt + H)">J1NN0 <span>LAB</span></a>

    <ul class="site-nav__links">
      {{- range site.Menus.main }}
      <li><a href="{{ .URL | absLangURL }}">{{ .Name }}</a></li>
      {{- end }}
    </ul>

    <details class="site-nav__mobile">
      <summary>MENU</summary>
      <ul>
        {{- range site.Menus.main }}
        <li><a href="{{ .URL | absLangURL }}">{{ .Name }}</a></li>
        {{- end }}
      </ul>
    </details>

    {{- if not site.Params.disableThemeToggle }}
    <button id="theme-toggle" class="site-nav__theme" type="button" accesskey="t" title="テーマを切り替え (Alt + T)" aria-label="ライトテーマとダークテーマを切り替え">THEME</button>
    {{- end }}
  </nav>
</header>
