baseURL: https://j1nn0.com/
title: j1nn0 lab
theme: ["PaperMod"]

defaultContentLanguage: ja
hasCJKLanguage: true
enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts"]
timeZone: Asia/Tokyo

module:
  mounts:
    - source: archetypes
      target: archetypes
    - source: assets
      target: assets
    - source: content
      target: content
    - source: data
      target: data
    - source: i18n
      target: i18n
    - source: layouts
      target: layouts
    - source: static
      target: static
    - source: static/images
      target: assets/images

minify:
  disableXML: true

menus:
  main:
    - name: Posts
      url: posts/
      weight: 5
    - name: About
      url: about/
      weight: 7
    - name: Search
      url: search/
      weight: 10
    - name: Tags
      url: tags/
      weight: 15
    - name: Archive
      url: archives
      weight: 20

taxonomies:
  category: categories
  tag: tags

pagination:
  pagerSize: 5

languages:
  ja:
    locale: ja-JP
    label: "Japanese"
    direction: ltr
    weight: 1

params:
  label:
    icon: /apple-touch-icon.png
    iconHeight: 30
  description: "Detours through dev environment, AI tools, and things I tried and wrote down."
  defaultTheme: auto
  defaultImage: "https://j1nn0.com/images/ogp-default.png"
  assets:
    theme_color: "#101225"
    msapplication_TileColor: "#101225"
  author: j1nn0
  twitter: "j1nn0"
  DateFormat: 2006-01-02

  ShowReadingTime: false
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  showtoc: true
  tocopen: true
  disableScrollToTop: false
  comments: true
  profileMode:
    enabled: false
  homeInfoParams:
    Title: "j1nn0 lab"
    Content: |
      Detours through dev environment, AI tools, and things I tried and wrote down.\
      Written by a developer working with Vue, PHP, C#, and AWS.

  socialIcons:
    - name: X
      title: X/Twitter
      url: "https://x.com/j1nn0"
    - name: github
      title: Github
      url: "https://github.com/j1nn0"
#    - name: bluesky
#      title: Bluesky
#      url: "https://bsky.app/profile/j1nn0.com"
#    - name: instagram
#      title: instagram
#      url: "https://www.instagram.com/_j1nn0_/"
#    - name: discord
#      title: Discord
#      url: "https://discordapp.com/users/460995342767357952"

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search
