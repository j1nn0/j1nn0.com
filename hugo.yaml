baseURL: https://j1nn0.com/
title: j1nn0 lab
theme: ["PaperMod"]

defaultContentLanguage: ja
hasCJKLanguage: true
enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true
mainsections: ["posts"]

minify:
  disableXML: true

menus:
  main:
    - name: Posts
      url: posts/
      weight: 5
    - name: Search
      url: search/
      weight: 10
    - name: Tags
      url: tags/
      weight: 15
    - name: Archive
      url: archives
      weight: 20

taxonomies:
  category: categories
  series: series
  tag: tags

pagination:
  pagerSize: 5

languages:
  ja:
    locale: ja-JP
    label: "Japanese"
    direction: ltr
    weight: 1

params:
  label:
    icon: /apple-touch-icon.png
    iconHeight: 30
  description: "Japanese developer / Vue, PHP, C#, AWS"
  defaultTheme: auto
  defaultImage: "https://j1nn0.com/images/ogp-default.png"
  author: j1nn0
  twitter: "j1nn0"
  DateFormat: 2006-01-02

  ShowReadingTime: false
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  showtoc: true
  tocopen: true
  disableScrollToTop: false
  comments: true
  profileMode:
    enabled: false
  homeInfoParams:
    Title: "j1nn0 lab"
    Content: |
      Japanese developer specializing in Vue, PHP, C#, and AWS.\
      Interested in developer productivity, AI coding assistants, and clean dev environments.

  socialIcons:
    - name: github
      title: Github
      url: "https://github.com/j1nn0"
    - name: X
      title: X/Twitter
      url: "https://x.com/j1nn0"
#    - name: bluesky
#      title: Bluesky
#      url: "https://bsky.app/profile/j1nn0.com"
#    - name: instagram
#      title: instagram
#      url: "https://www.instagram.com/_j1nn0_/"
#    - name: discord
#      title: Discord
#      url: "https://discordapp.com/users/460995342767357952"

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search
