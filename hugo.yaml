baseURL: https://j1nn0.com/
title: j1nn0 lab
theme: ["PaperMod"]

defaultContentLanguage: ja
hasCJKLanguage: true
timeZone: Asia/Tokyo

mainsections: ["posts"]

buildDrafts: false
buildExpired: false
buildFuture: false

enableEmoji: true
enableInlineShortcodes: true
enableRobotsTXT: true
markup:
  highlight:
    noClasses: false

languages:
  ja:
    direction: ltr
    label: "Japanese"
    locale: ja-JP
    weight: 1

taxonomies:
  category: categories
  tag: tags

pagination:
  pagerSize: 5

menus:
  main:
    - name: Posts
      url: posts/
      weight: 5
    - name: About
      url: about/
      weight: 7
    - name: Search
      url: search/
      weight: 10
    - name: Tags
      url: tags/
      weight: 15
    - name: Archive
      url: archives
      weight: 20

module:
  mounts:
    - source: archetypes
      target: archetypes
    - source: assets
      target: assets
    - source: content
      target: content
    - source: data
      target: data
    - source: i18n
      target: i18n
    - source: layouts
      target: layouts
    - source: static
      target: static
    - source: static/images
      target: assets/images

minify:
  disableXML: true

params:
  author: j1nn0
  description: "Detours through dev environment, AI tools, and things I tried and wrote down."
  defaultImage: "https://j1nn0.com/images/ogp-default.png"
  defaultTheme: auto
  twitter: "j1nn0"
  DateFormat: 2006-01-02

  assets:
    msapplication_TileColor: "#101225"
    theme_color: "#101225"
  label:
    icon: /apple-touch-icon.png
    iconHeight: 30

  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowFullTextinRSS: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowPostNavLinks: true
  ShowReadingTime: true
  ShowRssButtonInSectionTermList: true
  ShowShareButtons: true
  ShowWordCount: false

  comments: true
  disableScrollToTop: false
  profileMode:
    enabled: false
  homeInfoParams:
    Title: "j1nn0 lab"
    Content: |
      Detours through dev environment, AI tools, and things I tried and wrote down.\
      Written by a developer working with Vue, PHP, C#, and AWS.
  showtoc: true
  tocopen: true

  socialIcons:
    - name: X
      title: X/Twitter
      url: "https://x.com/j1nn0"
    - name: bluesky
      title: Bluesky
      url: "https://bsky.app/profile/j1nn0.com"
    - name: github
      title: Github
      url: "https://github.com/j1nn0"
#    - name: instagram
#      title: instagram
#      url: "https://www.instagram.com/_j1nn0_/"
#    - name: discord
#      title: Discord
#      url: "https://discordapp.com/users/460995342767357952"

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search
